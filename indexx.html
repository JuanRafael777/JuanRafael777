<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    </head>
<body>

    <header>
        <h1>Gestor de Tareas Grupo 3</h1>
    </header>

    <main>
        <section id="busqueda-tareas">
            <form action="index.php" method="GET">
                <label for="busqueda">Buscar tarea:</label>
                <input type="search" id="busqueda" name="q" placeholder="Buscar tarea específica..." value="<?php echo isset($_GET['q']) ? htmlspecialchars($_GET['q']) : ''; ?>">
                <button type="submit">Buscar</button>
            </form>
        </section>

        <hr>

        <section id="crear-tarea">
            <h2>Añadir Nueva Tarea</h2>
            <form action="procesar_tarea.php" method="POST">
                
                <div>
                    <label for="titulo">Título de la Tarea:</label>
                    <input type="text" id="titulo" name="titulo" required>
                </div>

                <div>
                    <label for="descripcion">Descripción:</label>
                    <textarea id="descripcion" name="descripcion" rows="3" required></textarea>
                </div>

                <div>
                    <label for="prioridad">Nivel de Importancia (Categoría):</label>
                    <select id="prioridad" name="prioridad" required>
                        <option value="" disabled selected>Seleccione la prioridad</option>
                        <option value="1">Alta Prioridad (Urgente)</option>
                        <option value="2">Media Prioridad</option>
                        <option value="3">Baja Prioridad</option>
                    </select>
                </div>

                <input type="hidden" name="accion" value="crear">
                <button type="submit">Guardar Tarea</button>

            </form>
        </section>

        <hr>

        <section id="listado-tareas">
            <h2>Tus Tareas</h2>

            <?php if (!empty($tareas)): ?>
                <?php foreach ($tareas as $tarea): ?>
                    
                    <article data-id="<?php echo $tarea['id']; ?>" data-prioridad="<?php echo $tarea['prioridad']; ?>">
                        
                        <header>
                            <h3><?php echo htmlspecialchars($tarea['titulo']); ?></h3>
                            <span>Prioridad: <?php echo htmlspecialchars($tarea['prioridad_texto']); ?></span>
                        </header>
                        
                        <p><?php echo htmlspecialchars($tarea['descripcion']); ?></p>
                        
                        <footer>
                            <form action="procesar_tarea.php" method="POST" style="display: inline;">
                                <input type="hidden" name="id" value="<?php echo $tarea['id']; ?>">
                                <input type="hidden" name="accion" value="completar">
                                <label>
                                    <input type="checkbox" name="estado" <?php echo ($tarea['estado'] == 'completada') ? 'checked' : ''; ?> onchange="this.form.submit()">
                                    Completada
                                </label>
                            </form>

                            <a href="editar_tarea.php?id=<?php echo $tarea['id']; ?>">Editar</a>

                            <form action="procesar_tarea.php" method="POST" style="display: inline;">
                                <input type="hidden" name="id" value="<?php echo $tarea['id']; ?>">
                                <input type="hidden" name="accion" value="eliminar">
                                <button type="submit">Eliminar</button>
                            </form>
                        </footer>

                    </article>

                <?php endforeach; ?>
            <?php else: ?>
                <p>No hay tareas registradas o que coincidan con la búsqueda.</p>
            <?php endif; ?>
            </section>
    </main>

    </body>
</html>
